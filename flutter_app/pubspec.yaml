name: takecharge
description: TakeCharge habit tracker

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP + session auth
  dio: ^5.4.3
  flutter_secure_storage: ^9.2.2

  # Image picker (profile photo)
  image_picker: ^1.1.2

  # Flutter_secure_storage not needed — cookie auth only

  # Fonts (Manrope + Plus Jakarta Sans — matching the web frontend exactly)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - assets/
